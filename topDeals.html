<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Deals</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/ass.css">

<body class="topDeals-body">
    
    <div class="cyber-banner">
        <div class="banner-content">
            <div class="text-content">
                <h1 class="main-headline">TOP DEALS</h1>
            </div>
        </div>
    </div>

  <main class="top-container">
    <section class="top-product-list">
    </section>
  </main>
  
    <div id="login-prompt-modal" class="modal-overlay hidden">
        <div class="modal-content text-center max-w-md">

            <p class="text-gray-600 mb-6">You need an account to add items to your cart and wishlist.</p>
            <div class="flex justify-center space-x-4">
                <button id="close-prompt-btn" class="px-6 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 font-semibold">Not Now</button>
                <a href="signin.html" class="block px-6 py-2 rounded-lg bg-purple-600 text-white hover:bg-purple-700 font-semibold">Sign In / Sign Up</a>
            </div>
        </div>

</body>
